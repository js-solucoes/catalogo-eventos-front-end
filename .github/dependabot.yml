# Atualiza dependências com PRs automáticos (supply chain / patches de segurança).
# Revise os PRs antes de merge, especialmente em actions que rodam com secrets.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
