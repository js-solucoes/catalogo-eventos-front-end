# Compara dependências da base da PR com o head e alerta sobre alterações com vulnerabilidades conhecidas.
#
# Requer Dependency graph ativo: Settings → Code security and analysis → Dependency graph.
# Repositórios privados sem GitHub Advanced Security podem não ter o gráfico; o passo abaixo
# usa continue-on-error para não bloquear PRs — ative o gráfico e, se quiserem gate estrito,
# removam continue-on-error depois de confirmar que o passo fica verde.

name: Dependency review

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
